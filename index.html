<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Weather App</title>
    <link href="style.css" rel="stylesheet"/>
  </head>
  <body>
    <nav>
      <div class="container">
        <div class="brand"><a href="#">City Weather</a></div>
        <form>
          <input name="city" id="city" type="search" value="Enter a city name"/>
        </form>
      </div>
    </nav>
    <div class="container">
      <div class="weather">
        <div class="overview">
          <!-- temp, feels like, desc -->
        </div>
        <div class="details">
          <!-- clouds, humidity, pressure, wind -->
        </div>
      </div>
    </div>
    <script src="app.js"></script>
  </body>
</html>
